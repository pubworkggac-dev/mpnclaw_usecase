# MQTT-InfluxDB + Mosquitto Docker 环境
# 一键启动: docker compose -f docker-compose.mosquitto.yml up
# 停止: docker compose -f docker-compose.mosquitto.yml down
# 首次运行后需初始化: docker exec mqtt-influxdb-influx2 influx setup 语句

services:
  influxdb2:
    container_name: mqtt-influxdb-influx2
    image: ${INFLUXDB_IMAGE:-influxdb:2}
    ports:
      - "${INFLUXDB_HTTP_PORT:-8086}:8086"
    volumes:
      - influxdb2-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    container_name: mqtt-influxdb-mosquitto
    image: ${MOSQUITTO_IMAGE:-eclipse-mosquitto:2}
    ports:
      - "${MOSQUITTO_PORT:-1883}:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1883"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  influxdb2-data:
    name: mqtt-influxdb-influxdb2-data
  mosquitto-data:
    name: mqtt-influxdb-mosquitto-data
  mosquitto-log:
    name: mqtt-influxdb-mosquitto-log

networks:
  default:
    name: mqtt-influxdb-network