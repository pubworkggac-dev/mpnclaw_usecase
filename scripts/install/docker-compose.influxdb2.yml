# InfluxDB OSS v2（本地冒烟环境）
# 由 start_influxdb_docker.sh 调用；工作目录应为 scripts/（以便解析相对 volume）。
services:
  influxdb2:
    container_name: mqtt-influxdb-influx2
    image: ${INFLUXDB_IMAGE:-influxdb:2}
    ports:
      - "${INFLUXDB_HTTP_PORT:-8086}:8086"
    volumes:
      - ../.local/influxdb2:/var/lib/influxdb2
